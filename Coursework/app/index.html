<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Prototype</title>

    <link rel="stylesheet" href="styles/main.css">
    <script src="libs/d3.v7.min.js"></script>
</head>

<body>

    <div class="app">

        <!-- Top Bar -->
        <header class="topbar">
            Dashboard Prototype
        </header>

        <!-- Main Layout -->
        <div class="main">

            <!-- Sidebar -->
            <aside class="sidebar">
                <h5>Sidebar Menu</h5>
            </aside>

            <!-- Content -->
            <section class="content">

                <!-- Top Section -->
                <div class="top-section">

                    <!-- Left Panel -->
                    <div class="panel-left">

                        <div class="top-controls">
                            <div class="box">
                                <input id="yearSlider" type="range" min="1990" max="2023" step="1" value="2023">
                                <span id="yearLabel">2020</span>
                            </div>

                            <div class="box">
                                <button id="changeYearTableDirect">Direct Usage</button>
                                <button id="changeYearTableReallocated">Reallocated Usage</button>
                            </div>
                        </div>

                        <div class="bottom-grid">
                            <div class="mini-box"></div>
                            <div id="line1" class="viz"></div>
                            <div class="mini-box"></div>
                        </div>

                    </div>

                    <!-- Right Panel -->
                    <div class="panel-right">
                        <div id="bar1" class="viz"></div>
                    </div>

                </div>

                <!-- Bottom Section -->
                <div class="bottom-section">

                    <div class="bottom-left">
                        <div id="bubble1" class="viz"></div>
                    </div>

                    <div class="bottom-right">
                        <div id="donut1" class="viz"></div>
                    </div>

                </div>

            </section>
        </div>
    </div>

    <script type="module" src="scripts/main.js"></script>

</body>

</html>
