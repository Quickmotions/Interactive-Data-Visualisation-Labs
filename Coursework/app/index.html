<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bootstrap Layout</title>

    <!-- Libraries and stylesheets imports -->
    <link rel="stylesheet" href="styles/main.css">
    <script src="libs/d3.v7.min.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-rbsA2VBKQhggwzxH7pPCaAqO46MgnOM80zW1RWuH61DGLwZJEdK2Kadq2F9CUG65" crossorigin="anonymous">

</head>

<body>
    <div class="container-fluid vh-100 d-flex flex-column">

        <!-- Top Bar -->
        <div class="row g-3">
            <div class="col-12">
                <div class="outlined p-3 text-center">
                    Top Bar
                </div>
            </div>
        </div>

        <!-- Main Content -->
        <div class="row flex-grow-1 g-3 mt-1">

            <!-- Sidebar -->
            <div class="col-2">
                <div class="outlined sidebar p-3 h-100">
                    <h5>Sidebar Menu</h5>
                    <ul class="nav flex-column">
                        <li class="nav-item"><a href="#" class="nav-link">Menu 1</a></li>
                        <li class="nav-item"><a href="#" class="nav-link">Menu 2</a></li>
                        <li class="nav-item"><a href="#" class="nav-link">Menu 3</a></li>
                    </ul>
                </div>
            </div>

            <!-- Right Content Area -->
            <div class="col-10 d-flex flex-column">

                <!-- Top Section -->
                <div class="row g-2 flex-grow-1">
                    <div class="col-4">
                        <div class="outlined h-100 p-3">
                            Top Left Square
                        </div>
                    </div>
                    <div class="col-8">
                        <div class="outlined h-100 p-3">
                            <div id="bar1" class="w-100 h-100"></div>
                        </div>
                    </div>
                </div>

                <!-- Bottom Section -->
                <div class="row g-3 mt-1 mb-2" style="height: 50%;">
                    <div class="col-8">
                        <div class="outlined h-100 p-3">
                            <div id="bar2" class="w-100 h-100"></div>
                        </div>
                    </div>
                    <div class="col-4">
                        <div class="outlined h-100 p-3">
                            Bottom Right Narrow Container
                        </div>
                    </div>
                </div>

            </div>
        </div>
    </div>


    <!-- Script imports -->
    <!-- <script src="libs/bootstrap.min.js"></script> -->
    <script type="module" src="scripts/main.js"></script>
</body>

</html>
